name: Learnee CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # === 後端 Server 流程 ===
    - name: Install Server Dependencies
      working-directory: ./server
      run: npm install 

    - name: Run Server Tests
      working-directory: ./server
      run: npm run test:coverage

    # 新增：將後端的 coverage 資料夾上傳保存
    - name: Upload Server Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: server-coverage-report
        path: server/coverage/

    # === 前端 Client 流程 ===
    - name: Install Client Dependencies
      working-directory: ./client
      run: npm install

    - name: Run Client Tests
      working-directory: ./client
      #在加上 --coverage 來產生前端的覆蓋率報告
      run: npm test -- --watchAll=false --passWithNoTests --coverage

    # 新增：將前端的 coverage 資料夾上傳保存
    - name: Upload Client Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: client-coverage-report
        path: client/coverage/

    - name: Build Client (React)
      working-directory: ./client
      # 在指令前加上 CI=false，讓警告不會中斷編譯流程
      run: CI=false npm run build