name: Learnee CI/CD Pipeline

# 設定觸發條件：當推播程式碼到 main 分支，或發起 Pull Request 時觸發
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 指定運行的虛擬環境作業系統
    runs-on: ubuntu-latest

    # 設定 Node.js 版本矩陣，可以同時測試多個版本
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 設定 Node.js 環境
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # === 後端 Server 流程 ===
    - name: Install Server Dependencies
      working-directory: ./server
      run: npm ci # 使用 npm ci 比 npm install 更嚴謹，適合 CI 環境

    - name: Run Server Tests
      working-directory: ./server
      run: npm test

    # === 前端 Client 流程 ===
    - name: Install Client Dependencies
      working-directory: ./client
      run: npm ci

    - name: Run Client Tests
      working-directory: ./client
      # 在 CI 環境中加入 --watchAll=false 避免 Jest 進入持續監聽模式導致 Action 卡住
      run: npm test -- --watchAll=false 

    - name: Build Client (React)
      working-directory: ./client
      # 確認前端能夠成功編譯打包
      run: npm run build
      
    # (可選) 如果你要進行 CD 自動部署，可以在這之後加上對應的部署指令或 Action