name: Learnee CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # === 後端 Server 流程 ===
    - name: Install Server Dependencies
      working-directory: ./server
      run: npm install 

    - name: Run Server Tests
      working-directory: ./server
      run: npm run test:coverage

    # 將後端的 coverage 資料夾上傳保存
    - name: Upload Server Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: server-coverage-report
        path: server/coverage/

    # === 前端 Client 流程 ===
    - name: Install Client Dependencies
      working-directory: ./client
      run: npm install

    - name: Run Client Tests
      working-directory: ./client
      # 加上 --coverage 來產生前端的覆蓋率報告
      run: npm test -- --watchAll=false --passWithNoTests --coverage

    # 將前端的 coverage 資料夾上傳保存
    - name: Upload Client Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: client-coverage-report
        path: client/coverage/

    - name: Build Client (React)
      working-directory: ./client
      # 在指令前加上 CI=false，讓警告不會中斷編譯流程
      run: CI=false npm run build


    # CD 持續部署
    - name: Deploy to Render (Server & Client)
      # 只有在 main 分支 push 且前面所有測試都通過時才部署
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        SERVER_HOOK: ${{ secrets.RENDER_SERVER_HOOK }}
        CLIENT_HOOK: ${{ secrets.RENDER_CLIENT_HOOK }}
      run: |
        echo "Triggering Server Deployment..."
        curl "$SERVER_HOOK"
        echo "Triggering Client Deployment..."
        curl "$CLIENT_HOOK"
      


